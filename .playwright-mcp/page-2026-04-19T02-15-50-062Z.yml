          - alert [ref=e213]:
            - img [ref=e215]
            - paragraph [ref=e219]: MCP clients can read and modify content in your open Roblox places. Make sure to only connect clients you trust.
          - paragraph [ref=e220]: To connect your client to the server, you can use either a JSON configuration or a CLI command.
          - paragraph [ref=e221]: If your client supports MCP config files, use the JSON configuration. Otherwise, use the CLI command.
          - heading "JSON configuration" [level=5] [ref=e222]
          - paragraph [ref=e223]: Most editors use JSON configuration files for MCP servers. The following examples show complete configurations you can use.
          - paragraph [ref=e224]: If Roblox Studio is your only MCP server, use these configurations as they are. If you're using multiple MCP servers, copy the Roblox_Studio entry and add it to your existing mcpServers dictionary.
          - paragraph [ref=e225]: The configuration depends on your operating system.
          - alert [ref=e226]:
            - img [ref=e228]
            - paragraph [ref=e232]: Your mcp.json file might already contain other entries. When adding the Roblox_Studio configuration, make sure each entry is separated by a comma. Missing commas will result in invalid JSON and prevent the configuration from loading.
