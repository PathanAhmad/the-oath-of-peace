                - text: to the mcp_config.json file.
            - listitem [ref=e492]:
              - generic [ref=e493]: Refresh the MCP Servers panel to verify that Roblox Studio tools appears in the active tools list.
          - heading "copy header link" [level=3] [ref=e494]:
            - link "copy header link" [ref=e495] [cursor=pointer]:
              - /url: "#other-mcp-clients"
              - text: Other MCP clients
          - paragraph [ref=e496]:
            - text: The Studio MCP server works with any client that supports stdio transport. Use the configuration JSON or CLI command from the
            - link "Connect your client" [ref=e497] [cursor=pointer]:
              - /url: "#connect-your-client"
            - text: section, then follow your client's documentation to add the server configuration. Restart the client to apply your changes.
          - heading "copy header link" [level=2] [ref=e498]:
            - link "copy header link" [ref=e499] [cursor=pointer]:
              - /url: "#use-multiple-studio-instances"
              - text: Use multiple Studio instances
          - paragraph [ref=e500]: You can connect a single MCP client to multiple running instances of Studio at the same time. The server automatically determines which instance to use based on context (for example, if you reference a specific experience or an object that exists only in that instance).
          - paragraph [ref=e501]: You can manually switch instances using list_roblox_studios and set_active_studio.
          - heading "copy header link" [level=2] [ref=e502]:
            - link "copy header link" [ref=e503] [cursor=pointer]:
              - /url: "#verify-your-connection"
              - text: Verify your connection
          - paragraph [ref=e504]: "After setting up your client, verify that the connection is working in Roblox Studio:"
          - list [ref=e505]:
            - listitem [ref=e506]:
              - generic [ref=e507]: Open Assistant.
            - listitem [ref=e508]:
              - generic [ref=e509]: Click … ⟩ Manage MCP Servers.
            - listitem [ref=e510]:
              - generic [ref=e511]: Under Enable Studio as MCP server, check for the green indicator to confirm that the client has connected successfully.
          - heading "copy header link" [level=2] [ref=e512]:
            - link "copy header link" [ref=e513] [cursor=pointer]:
              - /url: "#troubleshooting"
              - text: Troubleshooting
          - paragraph [ref=e514]: "If the server is not showing up, or the tools aren't available:"
          - list [ref=e515]:
            - listitem [ref=e516]:
              - generic [ref=e517]: Restart both Roblox Studio and your MCP client.
            - listitem [ref=e518]:
              - generic [ref=e519]: Verify that the command or binary path is correct and the file exists.
            - listitem [ref=e520]:
              - generic [ref=e521]: Check your JSON syntax. Even a missing comma or bracket can prevent the configuration from loading.
