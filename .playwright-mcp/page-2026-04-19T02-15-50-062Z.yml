        - article [ref=e71]:
          - paragraph [ref=e72]:
            - text: The Roblox Studio MCP server is built into Roblox Studio. It implements the
            - link "Model Context Protocol (MCP)" [ref=e73] [cursor=pointer]:
              - /url: https://modelcontextprotocol.io/docs/getting-started/intro
            - text: ", an open standard that lets AI tools securely communicate with external applications. Once connected, your AI client can interact directly with your open Studio session, exploring the data model, writing scripts, running Luau code, and testing your experience in play mode."
          - paragraph [ref=e74]: "This guide shows you how to connect the Studio MCP server to popular AI clients. While the setup varies by client, the core idea is the same: you configure your client to connect to the MCP server and then send commands from the client to your active Studio session."
          - heading "copy header link" [level=2] [ref=e75]:
            - link "copy header link" [ref=e76] [cursor=pointer]:
              - /url: "#prerequisites"
              - text: Prerequisites
          - paragraph [ref=e77]: Before you can connect to the server, make sure you have the latest version of Roblox Studio and your preferred MCP client installed on your computer.
