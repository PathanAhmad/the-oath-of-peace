          - paragraph [ref=e202]: "To enable the MCP server in Studio:"
          - list [ref=e203]:
            - listitem [ref=e204]:
              - generic [ref=e205]: Open Assistant.
            - listitem [ref=e206]:
              - generic [ref=e207]: Click … ⟩ Manage MCP Servers.
            - listitem [ref=e208]:
              - generic [ref=e209]: Turn on Enable Studio as MCP server.
          - paragraph [ref=e210]: Once enabled, the settings panel displays the JSON configuration and startup command for your client. When a client connects successfully, a green indicator shows the number of connected clients.
